<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>T-Shirt Generator</title>

  <style>
    @font-face {
      font-family: "SF Collegiate";
      src: url("fonts/SfCollegiate-K0Xe.ttf") format("truetype");
    }

    @font-face {
      font-family: "High School USA Sans";
      src: url("fonts/HighSchoolUsaSans-52vx.ttf") format("truetype");
    }

    body {
      margin: 0;
      padding: 30px;
      background: #f2f2f2;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    input {
      width: 240px;
      padding: 12px;
      margin: 10px;
      font-size: 18px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 14px 28px;
      font-size: 18px;
      background: black;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    .preview-box {
      margin: 30px auto 0;
      width: 720px;
      max-width: 95%;
      background: black;
      padding: 20px;
    }

    canvas {
      width: 100%;
      height: auto;
      background: transparent;
      display: block;
    }
  </style>
</head>

<body>

  <h1>Create Your Shirt Print</h1>

  <input id="playerName" type="text" placeholder="Player Name" maxlength="12" />
  <input id="playerNumber" type="text" placeholder="Number" maxlength="2" />

  <br />

  <button onclick="downloadPNG()">Download Ultra HD Transparent PNG</button>

  <div class="preview-box">
    <canvas id="previewCanvas" width="12000" height="9000"></canvas>
  </div>

  <script>
    const canvas = document.getElementById("previewCanvas");
    const ctx = canvas.getContext("2d");

    const nameInput = document.getElementById("playerName");
    const numberInput = document.getElementById("playerNumber");

    const GOLD = "#C8A24A";

    async function loadFonts() {
      await document.fonts.load('1000px "High School USA Sans"');
      await document.fonts.load('2300px "SF Collegiate"');
      await document.fonts.ready;
    }

    function drawCenteredText(text, fontFamily, fontSize, y, maxWidth) {
      ctx.font = `${fontSize}px "${fontFamily}"`;
      ctx.fillStyle = GOLD;
      ctx.textAlign = "center";
      ctx.textBaseline = "top";

      let size = fontSize;
      let metrics = ctx.measureText(text);

      while (metrics.width > maxWidth && size > 100) {
        size -= 20;
        ctx.font = `${size}px "${fontFamily}"`;
        metrics = ctx.measureText(text);
      }

      ctx.fillText(text, canvas.width / 2, y);
    }

    async function drawDesign() {
      await loadFonts();

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const name = (nameInput.value || "DAN").toUpperCase();
      const number = numberInput.value || "00";

      drawCenteredText(
        name,
        "High School USA Sans",
        1000,
        650,
        9000
      );

      drawCenteredText(
        number,
        "SF Collegiate",
        2300,
        2300,
        9000
      );
    }

    nameInput.addEventListener("input", drawDesign);
    numberInput.addEventListener("input", drawDesign);

    async function downloadPNG() {
      await drawDesign();

      const pngData = canvas.toDataURL("image/png");

      const link = document.createElement("a");
      link.download = "tshirt-print-ultrahd-transparent.png";
      link.href = pngData;
      link.click();
    }

    drawDesign();
  </script>

</body>
</html>
