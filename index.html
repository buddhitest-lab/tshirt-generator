<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>T-Shirt Generator</title>

  <style>
    @font-face {
      font-family: "SF Collegiate";
      src: url("fonts/SfCollegiate-K0Xe.ttf") format("truetype");
    }

    @font-face {
      font-family: "High School USA Sans";
      src: url("fonts/HighSchoolUsaSans-52vx.ttf") format("truetype");
    }

    body {
      margin: 0;
      padding: 30px;
      background: #f2f2f2;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    input {
      width: 240px;
      padding: 12px;
      margin: 10px;
      font-size: 18px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 14px 28px;
      font-size: 18px;
      background: black;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    canvas {
      margin-top: 25px;
      max-width: 90%;
      background: transparent;
    }
  </style>
</head>

<body>

  <h1>Create Your Shirt Print</h1>

  <input id="playerName" type="text" placeholder="Player Name" maxlength="12" />
  <input id="playerNumber" type="text" placeholder="Number" maxlength="2" />

  <br />

  <button onclick="downloadPNG()">Download High Resolution PNG</button>

  <br />

  <canvas id="previewCanvas" width="3000" height="2200"></canvas>

  <script>
    const canvas = document.getElementById("previewCanvas");
    const ctx = canvas.getContext("2d");

    const nameInput = document.getElementById("playerName");
    const numberInput = document.getElementById("playerNumber");

    const GOLD = "#C8A24A";

    async function loadFonts() {
      await document.fonts.load("90pt 'High School USA Sans'");
      await document.fonts.load("330pt 'SF Collegiate'");
      await document.fonts.ready;
    }

    function drawCenteredText(text, font, y, maxWidth) {
      ctx.font = font;
      ctx.fillStyle = GOLD;
      ctx.textAlign = "center";
      ctx.textBaseline = "top";

      let size = parseInt(font);
      let family = font.substring(font.indexOf(" ") + 1);

      while (ctx.measureText(text).width > maxWidth && size > 20) {
        size -= 5;
        ctx.font = size + "pt " + family;
      }

      ctx.fillText(text, canvas.width / 2, y);
    }

    async function drawDesign() {
      await loadFonts();

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const name = (nameInput.value || "BUDDHI").toUpperCase();
      const number = numberInput.value || "09";

      drawCenteredText(
        name,
        "90pt 'High School USA Sans'",
        180,
        2700
      );

      drawCenteredText(
        number,
        "330pt 'SF Collegiate'",
        430,
        2700
      );
    }

    nameInput.addEventListener("input", drawDesign);
    numberInput.addEventListener("input", drawDesign);

    async function downloadPNG() {
      await drawDesign();

      let dataUrl = canvas.toDataURL("image/png");
      let sizeMB = dataUrl.length * 0.75 / 1024 / 1024;

      if (sizeMB > 15) {
        alert("File is over 15MB. Downloading optimized version.");

        const smallCanvas = document.createElement("canvas");
        smallCanvas.width = 2400;
        smallCanvas.height = 1760;

        const smallCtx = smallCanvas.getContext("2d");
        smallCtx.drawImage(canvas, 0, 0, smallCanvas.width, smallCanvas.height);

        dataUrl = smallCanvas.toDataURL("image/png");
      }

      const link = document.createElement("a");
      link.download = "tshirt-print.png";
      link.href = dataUrl;
      link.click();
    }

    drawDesign();
  </script>

</body>
</html>
