<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>T-Shirt Generator</title>

  <style>
    @font-face {
      font-family: "SF Collegiate";
      src: url("fonts/SfCollegiate-K0Xe.ttf?v=4") format("truetype");
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: "High School USA Sans";
      src: url("fonts/HighSchoolUsaSans-52vx.ttf?v=4") format("truetype");
      font-weight: normal;
      font-style: normal;
    }

    body {
      margin: 0;
      padding: 30px;
      background: #f2f2f2;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    input {
      width: 240px;
      padding: 12px;
      margin: 10px;
      font-size: 18px;
    }

    input[type="checkbox"] {
      width: auto;
      margin-right: 8px;
    }

    label {
      font-size: 18px;
    }

    button {
      padding: 14px 28px;
      font-size: 18px;
      background: black;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 18px;
    }

    .preview-box {
      margin: 30px auto;
      width: 720px;
      max-width: 95%;
      background: black;
      padding: 20px;
    }

    canvas {
      width: 100%;
      display: block;
      background: transparent;
    }
  </style>
</head>

<body>

  <h1>Create Your Shirt Print</h1>

  <input id="playerName" type="text" placeholder="Player Name" maxlength="12" />

  <input id="playerNumber" type="text" placeholder="Number" maxlength="2" />

  <br />

  <label>
    <input type="checkbox" id="isCricketer" />
    I am a cricketer of the Jyväskylä Titans Crickert team
  </label>

  <br />

  <button onclick="downloadPNG()">Download Ultra HD Transparent PNG</button>

  <div class="preview-box">
    <canvas id="previewCanvas" width="12000" height="9000"></canvas>
  </div>

  <script>
    const canvas = document.getElementById("previewCanvas");
    const ctx = canvas.getContext("2d");

    const nameInput = document.getElementById("playerName");
    const numberInput = document.getElementById("playerNumber");
    const isCricketerInput = document.getElementById("isCricketer");

    const GOLD = "#C8A24A";

    async function loadFonts() {
      await document.fonts.load('900px "SF Collegiate"');
      await document.fonts.load('2300px "SF Collegiate"');
      await document.fonts.ready;
    }

    function drawText(text, size, y, maxWidth) {
      ctx.font = `${size}px "SF Collegiate"`;
      ctx.fillStyle = GOLD;
      ctx.textAlign = "center";
      ctx.textBaseline = "top";

      while (ctx.measureText(text).width > maxWidth && size > 100) {
        size -= 20;
        ctx.font = `${size}px "SF Collegiate"`;
      }

      ctx.fillText(text, canvas.width / 2, y);
    }

    function updateNumberLock() {
      if (isCricketerInput.checked) {
        numberInput.disabled = false;
      } else {
        numberInput.value = "00";
        numberInput.disabled = true;
      }

      drawDesign();
    }

    async function drawDesign() {
      await loadFonts();

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const name = (nameInput.value || "DAN").toUpperCase();

      const number = isCricketerInput.checked
        ? (numberInput.value || "00")
        : "00";

      drawText(name, 900, 650, 8500);
      drawText(number, 2300, 2300, 8500);
    }

    nameInput.addEventListener("input", drawDesign);
    numberInput.addEventListener("input", drawDesign);
    isCricketerInput.addEventListener("change", updateNumberLock);

    async function downloadPNG() {
      await drawDesign();

      const link = document.createElement("a");
      link.download = "t-shirt-back-image.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    updateNumberLock();
  </script>

</body>
</html>
