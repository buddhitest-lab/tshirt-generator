<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>T-Shirt Generator</title>

  <style>
    @font-face {
      font-family: "SF Collegiate";
      src: url("fonts/SfCollegiate-K0Xe.ttf") format("truetype");
    }

    @font-face {
      font-family: "High School USA Sans";
      src: url("fonts/HighSchoolUsaSans-52vx.ttf") format("truetype");
    }

    body {
      margin: 0;
      padding: 30px;
      background: #f2f2f2;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      margin-bottom: 25px;
    }

    input {
      width: 240px;
      padding: 12px;
      margin: 10px;
      font-size: 18px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 14px 28px;
      font-size: 18px;
      background: black;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    canvas {
      margin-top: 30px;
      width: 500px;
      max-width: 90%;
      background: transparent;
    }
  </style>
</head>

<body>

  <h1>Create Your Shirt Print</h1>

  <input
    id="playerName"
    type="text"
    placeholder="Player Name"
    maxlength="12"
  />

  <input
    id="playerNumber"
    type="text"
    placeholder="Number"
    maxlength="2"
  />

  <br />

  <button onclick="downloadPNG()">
    Download Ultra HD PNG
  </button>

  <br />

  <canvas id="previewCanvas" width="12000" height="12000"></canvas>

  <script>
    const canvas = document.getElementById("previewCanvas");
    const ctx = canvas.getContext("2d");

    const nameInput = document.getElementById("playerName");
    const numberInput = document.getElementById("playerNumber");

    const GOLD = "#C8A24A";

    async function loadFonts() {
      await document.fonts.load('700 520px "High School USA Sans"');
      await document.fonts.load('700 1900px "SF Collegiate"');
      await document.fonts.ready;
    }

    function drawCenteredText(text, font, y) {

      ctx.font = font;
      ctx.fillStyle = GOLD;
      ctx.textAlign = "center";
      ctx.textBaseline = "top";

      const metrics = ctx.measureText(text);

      const realWidth =
        metrics.actualBoundingBoxLeft +
        metrics.actualBoundingBoxRight;

      const x =
        (canvas.width / 2) +
        (metrics.actualBoundingBoxLeft / 2);

      ctx.fillText(text, x, y);
    }

    async function drawDesign() {

      await loadFonts();

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const name =
        (nameInput.value || "DAN").toUpperCase();

      const number =
        numberInput.value || "00";

      drawCenteredText(
        name,
        '700 520px "High School USA Sans"',
        1200
      );

      drawCenteredText(
        number,
        '700 1900px "SF Collegiate"',
        2400
      );
    }

    nameInput.addEventListener("input", drawDesign);
    numberInput.addEventListener("input", drawDesign);

    async function downloadPNG() {

      await drawDesign();

      const pngData =
        canvas.toDataURL("image/png");

      const link =
        document.createElement("a");

      link.download =
        "tshirt-print-ultrahd.png";

      link.href =
        pngData;

      link.click();
    }

    drawDesign();
  </script>

</body>
</html>
