<!DOCTYPE html>
<html>
<head>
  <title>T-Shirt Generator</title>

  <style>
    @font-face {
      font-family: "SF Collegiate";
      src: url("fonts/SfCollegiate-K0Xe.ttf") format("truetype");
    }

    @font-face {
      font-family: "High School USA Sans";
      src: url("fonts/HighSchoolUsaSans-52vx.ttf") format("truetype");
    }

    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
      background: #f2f2f2;
    }

    h1 {
      margin-bottom: 20px;
    }

    input {
      padding: 10px;
      margin: 10px;
      font-size: 18px;
      width: 220px;
    }

    button {
      padding: 12px 24px;
      font-size: 18px;
      cursor: pointer;
      background: black;
      color: white;
      border: none;
      border-radius: 6px;
      margin-top: 15px;
    }

    .preview-area {
      width: 100%;
      overflow: hidden;
      margin-top: 20px;
    }

    .preview-scale {
      width: 1800px;
      height: 2200px;
      transform: scale(0.25);
      transform-origin: top center;
      margin: 0 auto;
    }

    .design {
      width: 1800px;
      height: 2200px;
      position: relative;
      background: transparent;
      overflow: hidden;
    }

    .name {
      position: absolute;
      top: 180px;
      left: 0;
      width: 100%;
      text-align: center;
      font-family: "High School USA Sans", Arial, sans-serif;
      font-size: 90pt;
      color: #C8A24A;
      background: transparent;
      line-height: 1;
      letter-spacing: 6px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .number {
      position: absolute;
      top: 430px;
      left: 0;
      width: 100%;
      text-align: center;
      font-family: "SF Collegiate", Arial, sans-serif;
      font-size: 330pt;
      color: #C8A24A;
      background: transparent;
      line-height: 0.85;
      white-space: nowrap;
    }

    .note {
      font-size: 14px;
      color: #555;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <h1>Create Your Shirt Print</h1>

  <input
    type="text"
    id="playerName"
    placeholder="Player Name"
    maxlength="12"
  >

  <input
    type="text"
    id="playerNumber"
    placeholder="Number"
    maxlength="2"
  >

  <br>

  <button onclick="downloadPNG()">Download High Resolution PNG</button>

  <p class="note">PNG export uses transparent background and keeps file size under 15MB where possible.</p>

  <div class="preview-area">
    <div class="preview-scale">
      <div class="design" id="design">
        <div class="name" id="namePreview">BUDDHI</div>
        <div class="number" id="numberPreview">09</div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <script>
    const nameInput = document.getElementById("playerName");
    const numberInput = document.getElementById("playerNumber");
    const namePreview = document.getElementById("namePreview");
    const numberPreview = document.getElementById("numberPreview");

    nameInput.addEventListener("input", () => {
      namePreview.innerText = (nameInput.value || "BUDDHI").toUpperCase();
    });

    numberInput.addEventListener("input", () => {
      numberPreview.innerText = numberInput.value || "09";
    });

    async function downloadPNG() {
      const design = document.getElementById("design");

      await document.fonts.ready;

      let canvas = await html2canvas(design, {
        backgroundColor: null,
        scale: 2,
        useCORS: true
      });

      let pngData = canvas.toDataURL("image/png");
      let fileSizeMB = pngData.length * 0.75 / 1024 / 1024;

      if (fileSizeMB > 15) {
        canvas = await html2canvas(design, {
          backgroundColor: null,
          scale: 1.5,
          useCORS: true
        });

        pngData = canvas.toDataURL("image/png");
        fileSizeMB = pngData.length * 0.75 / 1024 / 1024;
      }

      if (fileSizeMB > 15) {
        canvas = await html2canvas(design, {
          backgroundColor: null,
          scale: 1,
          useCORS: true
        });

        pngData = canvas.toDataURL("image/png");
      }

      const link = document.createElement("a");
      link.download = "tshirt-print.png";
      link.href = pngData;
      link.click();
    }
  </script>

</body>
</html>
