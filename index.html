<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>T-Shirt Generator</title>

  <style>
    @font-face {
      font-family: "SF Collegiate";
      src: url("fonts/SfCollegiate-K0Xe.ttf") format("truetype");
    }

    @font-face {
      font-family: "High School USA Sans";
      src: url("fonts/HighSchoolUsaSans-52vx.ttf") format("truetype");
    }

    body {
      margin: 0;
      padding: 30px;
      background: #f2f2f2;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    input {
      width: 240px;
      padding: 12px;
      margin: 10px;
      font-size: 18px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 14px 28px;
      font-size: 18px;
      background: black;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    canvas {
      margin-top: 25px;
      max-width: 90%;
      background: transparent;
    }
  </style>
</head>

<body>

  <h1>Create Your Shirt Print</h1>

  <input id="playerName" type="text" placeholder="Player Name" maxlength="12" />
  <input id="playerNumber" type="text" placeholder="Number" maxlength="2" />

  <br />

  <button onclick="downloadPNG()">Download High Resolution PNG</button>

  <br />

  <canvas id="previewCanvas" width="5000" height="3000"></canvas>

  <script>
    const canvas = document.getElementById("previewCanvas");
    const ctx = canvas.getContext("2d");

    const nameInput = document.getElementById("playerName");
    const numberInput = document.getElementById("playerNumber");

    const GOLD = "#C8A24A";

    const PT_TO_PX = 96 / 72;

    const nameSizePx = 90 * PT_TO_PX;
    const numberSizePx = 330 * PT_TO_PX;

    async function loadFonts() {
      await document.fonts.load(`${nameSizePx}px "High School USA Sans"`);
      await document.fonts.load(`${numberSizePx}px "SF Collegiate"`);
      await document.fonts.ready;
    }

    function drawAccurateText(text, fontFamily, fontSizePx, topY, maxWidth) {
      ctx.font = `${fontSizePx}px "${fontFamily}"`;
      ctx.fillStyle = GOLD;
      ctx.textAlign = "left";
      ctx.textBaseline = "alphabetic";

      let size = fontSizePx;
      let metrics = ctx.measureText(text);
      let actualWidth =
        metrics.actualBoundingBoxLeft + metrics.actualBoundingBoxRight;

      while (actualWidth > maxWidth && size > 40) {
        size -= 5;
        ctx.font = `${size}px "${fontFamily}"`;
        metrics = ctx.measureText(text);
        actualWidth =
          metrics.actualBoundingBoxLeft + metrics.actualBoundingBoxRight;
      }

      const x =
        (canvas.width - actualWidth) / 2 + metrics.actualBoundingBoxLeft;

      const baselineY =
        topY + metrics.actualBoundingBoxAscent;

      ctx.fillText(text, x, baselineY);
    }

    async function drawDesign() {
      await loadFonts();

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const name = (nameInput.value || "BUDDHI").toUpperCase();
      const number = numberInput.value || "09";

      drawAccurateText(
        name,
        "High School USA Sans",
        nameSizePx,
        250,
        4200
      );

      drawAccurateText(
        number,
        "SF Collegiate",
        numberSizePx,
        520,
        4200
      );
    }

    nameInput.addEventListener("input", drawDesign);
    numberInput.addEventListener("input", drawDesign);

    async function downloadPNG() {
      await drawDesign();

      let dataUrl = canvas.toDataURL("image/png");
      let sizeMB = dataUrl.length * 0.75 / 1024 / 1024;

      if (sizeMB > 15) {
        const smallerCanvas = document.createElement("canvas");
        smallerCanvas.width = 3500;
        smallerCanvas.height = 2100;

        const smallerCtx = smallerCanvas.getContext("2d");
        smallerCtx.drawImage(canvas, 0, 0, smallerCanvas.width, smallerCanvas.height);

        dataUrl = smallerCanvas.toDataURL("image/png");
      }

      const link = document.createElement("a");
      link.download = "tshirt-print.png";
      link.href = dataUrl;
      link.click();
    }

    drawDesign();
  </script>

</body>
</html>
